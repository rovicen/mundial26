name: Actualizar datos Mundial 2026

on:
  schedule:
    - cron: '0 */2 * * *' # Runs at 0 minutes past the hour, every 2 hours
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar script de actualizacion
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/actualizar-datos.mjs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "chore: actualizar data.json" && git pull --rebase origin main && git push)
