<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a6b" />
  <title>Tablero Mundial 2026</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a1a; color: #e8e8f0; min-height: 100vh; }
    header { background: #1a3a6b; padding: 1rem 1.5rem; display: flex; align-items: center; gap: .75rem; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    #actualizado { font-size: .75rem; color: #a0b0c8; margin-left: auto; }
    main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    #estado { text-align: center; padding: 3rem; color: #a0b0c8; }
    .grupo { margin-bottom: 2rem; }
    .grupo h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: .08em; color: #7090b8; border-bottom: 1px solid #1e2e44; padding-bottom: .4rem; margin-bottom: .75rem; }
    .partido { background: #111827; border: 1px solid #1e2e44; border-radius: 8px; padding: .75rem 1rem; margin-bottom: .5rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: .5rem; }
    .equipo { display: flex; align-items: center; gap: .5rem; }
    .equipo.local { justify-content: flex-end; }
    .nombre { font-size: .9rem; font-weight: 600; }
    .marcador { font-size: 1.2rem; font-weight: 700; color: #ffd700; text-align: center; min-width: 60px; }
    .estado-partido { grid-column: 1/-1; text-align: center; font-size: .7rem; color: #7090b8; margin-top: .25rem; }
    .en-vivo { color: #ff4444; animation: pulso 1s infinite; }
    @keyframes pulso { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.8rem">&#x26BD;</span>
    <h1>Mundial 2026</h1>
    <span id="actualizado"></span>
  </header>
  <main>
    <div id="estado">Cargando datos...</div>
    <div id="tablero"></div>
  </main>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

    async function cargar() {
      try {
        const data = await fetch('/data.json?t=' + Date.now()).then(r => r.json());
        renderizar(data);
      } catch { document.getElementById('estado').textContent = 'Error al cargar datos.'; }
    }

    function renderizar(data) {
      const estado = document.getElementById('estado');
      const tablero = document.getElementById('tablero');
      if (data.actualizadoEn) document.getElementById('actualizado').textContent = 'Act: ' + data.actualizadoEn;
      const partidos = data.partidos || [];
      if (!partidos.length) { estado.textContent = 'No hay partidos disponibles aún.'; return; }
      estado.style.display = 'none';
      const grupos = {};
      partidos.forEach(p => { const f = p.stage || 'Partidos'; (grupos[f] = grupos[f] || []).push(p); });
      tablero.innerHTML = '';
      for (const [fase, lista] of Object.entries(grupos)) {
        const sec = document.createElement('section');
        sec.className = 'grupo';
        sec.innerHTML = '<h2>' + fase + '</h2>';
        lista.forEach(p => {
          const local = p.homeTeam || {}, visitante = p.awayTeam || {};
          const ft = (p.score || {}).fullTime || p.score || {};
          const gL = ft.home ?? '-', gV = ft.away ?? '-';
          const enVivo = p.status === 'IN_PLAY' || p.status === 'PAUSED';
          const d = document.createElement('div');
          d.className = 'partido';
          d.innerHTML = '<div class="equipo local"><span class="nombre">' + (local.name || '') + '</span></div>' +
            '<div class="marcador">' + gL + ' - ' + gV + '</div>' +
            '<div class="equipo"><span class="nombre">' + (visitante.name || '') + '</span></div>' +
            '<div class="estado-partido' + (enVivo ? ' en-vivo' : '') + '">' +
            (enVivo ? 'EN VIVO' : (p.utcDate ? new Date(p.utcDate).toLocaleString('es-MX') : '')) + '</div>';
          sec.appendChild(d);
        });
        tablero.appendChild(sec);
      }
    }

    cargar();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) cargar(); });
    setInterval(cargar, 5 * 60 * 1000);
  </script>
</body>
</html>
